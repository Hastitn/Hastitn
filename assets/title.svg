<svg width="1000" height="230" viewBox="0 0 1000 230" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated title">
  <defs>
    <style>
      .main {
        fill: #FFFFFF;
        text-anchor: middle;
        font-family: Georgia, "Times New Roman", serif;
      }

      .line1 {
        font-size: 36px;
        font-weight: 700;
      }

      .line2, .line3 {
        font-size: 24px;
        font-weight: 600;
      }

      .accent {
        fill: #f6b7ff;
        font-size: 18px;
        opacity: 0;
      }

      .cursor {
        fill: #f6b7ff;
      }
    </style>

    <!-- reveal areas -->
    <clipPath id="clip1">
      <rect x="150" y="20" width="0" height="40">
        <animate attributeName="width" from="0" to="700" begin="0.2s" dur="2s" fill="freeze" />
      </rect>
    </clipPath>

    <clipPath id="clip2">
      <rect x="110" y="85" width="0" height="35">
        <animate attributeName="width" from="0" to="780" begin="2.7s" dur="2.2s" fill="freeze" />
      </rect>
    </clipPath>

    <clipPath id="clip3">
      <rect x="170" y="145" width="0" height="35">
        <animate attributeName="width" from="0" to="660" begin="5.3s" dur="2s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <!-- decorative stars and hearts -->
  <text x="165" y="38" class="accent">✦
    <animate attributeName="opacity" from="0" to="1" begin="7.4s" dur="0.4s" fill="freeze" />
  </text>
  <text x="835" y="38" class="accent">✦
    <animate attributeName="opacity" from="0" to="1" begin="7.6s" dur="0.4s" fill="freeze" />
  </text>
  <text x="170" y="165" class="accent">♡
    <animate attributeName="opacity" from="0" to="1" begin="7.8s" dur="0.4s" fill="freeze" />
  </text>
  <text x="810" y="165" class="accent">♡
    <animate attributeName="opacity" from="0" to="1" begin="8s" dur="0.4s" fill="freeze" />
  </text>
  <text x="130" y="104" class="accent">✧
    <animate attributeName="opacity" from="0" to="1" begin="7.7s" dur="0.4s" fill="freeze" />
  </text>
  <text x="865" y="104" class="accent">✧
    <animate attributeName="opacity" from="0" to="1" begin="7.7s" dur="0.4s" fill="freeze" />
  </text>

  <!-- line 1 -->
  <g clip-path="url(#clip1)">
    <text x="500" y="50" class="main line1">Hello my friend, I'm Hasti Tabrizi</text>
  </g>

  <!-- cursor 1 -->
  <rect x="150" y="26" width="3" height="28" class="cursor">
    <animate attributeName="x" from="150" to="845" begin="0.2s" dur="2s" fill="freeze" />
    <animate attributeName="opacity" values="1;0;1;0;1;0;1" begin="0.2s" dur="2s" fill="freeze" />
    <set attributeName="opacity" to="0" begin="2.2s" />
  </rect>

  <!-- line 2 -->
  <g clip-path="url(#clip2)">
    <text x="500" y="110" class="main line2">Welcome to my world of data, creativity, and technology</text>
  </g>

  <!-- cursor 2 -->
  <rect x="110" y="88" width="3" height="24" class="cursor">
    <animate attributeName="x" from="110" to="890" begin="2.7s" dur="2.2s" fill="freeze" />
    <animate attributeName="opacity" values="1;0;1;0;1;0;1;0;1" begin="2.7s" dur="2.2s" fill="freeze" />
    <set attributeName="opacity" to="0" begin="4.95s" />
  </rect>

  <!-- line 3 -->
  <g clip-path="url(#clip3)">
    <text x="500" y="170" class="main line3">A passionate Data Science student from Canada</text>
  </g>

  <!-- cursor 3 -->
  <rect x="170" y="148" width="3" height="24" class="cursor">
    <animate attributeName="x" from="170" to="830" begin="5.3s" dur="2s" fill="freeze" />
    <animate attributeName="opacity" values="1;0;1;0;1;0;1" begin="5.3s" dur="2s" fill="freeze" />
  </rect>

  <!-- final blinking cursor that stays -->
  <rect x="832" y="148" width="3" height="24" class="cursor" opacity="0">
    <set attributeName="opacity" to="1" begin="7.35s" />
    <animate attributeName="opacity" values="1;0;1;0;1;0;1" begin="7.35s" dur="1.2s" repeatCount="indefinite" />
  </rect>
</svg>
